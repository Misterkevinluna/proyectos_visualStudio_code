<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product App</title>

    <!-- BOOTSTRAP CDN -->
    <link rel="preload" href="css/bootstrap.css" as="style">
    <link rel="stylesheet" href="css/bootstrap.css"> 
</head>
<body>
    <!-- NAVEGACION -->
    <nav class="navbar navbar-light bg-light">
        <a href="/" class="navbar-brand">
            Product App
        </a>
    </nav>

    <div class="container">
        <!-- APLICACION -->
        <div id="App" class="row pt-5">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h1>Add A Product</h1>
                    </div>
                    <form id="product-form" class="card-body">
                        <div class="mb-3">
                            <input class="form-control" type="text" id="name" placeholder="Product Name">
                        </div>
                        <div class="mb-3">
                            <input type="number" step="0.01" id="price" class="form-control" placeholder="Product Price">
                        </div>
                        <div class="mb-3">
                            <input type="number" id="year" class="form-control" min="2000" max="2026" value="2025" placeholder="Year Product">
                        </div>
                        <input type="submit" value="Save" class="btn btn-primary d-grid w-100">
                    </form>
                </div>
            </div>
            <div id="product-list" class="col-md-8">

            </div>

         </div>

    </div>

   
    <script src="app.js"></script>
</body>
</html>
