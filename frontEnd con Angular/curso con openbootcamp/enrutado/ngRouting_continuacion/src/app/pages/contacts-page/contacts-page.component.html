<h1>Tus Contactos:</h1>

<!-- Listar los contactos y poder navegar al pinchar en uno de ellos al detalle -->
<div *ngFor="let contacto of listaContactos; let i=index">
    <div routerLink="{{contacto.id}}" [state]="{data: contacto, filtro: filtroSexo}"><!-- sin el slach(/) al principio de la ruta la ruta se concatena
        con la ruta del componente y con el slach al principio se dirije al componente asociado a dicha ruta-->
        <h6 class="contacto">Nombre: {{ contacto.nombre }}</h6>
        <button (click)="volverAHome(contacto)">Seleccionar como Amigo Invisible</button>
    </div>
</div>

<ng-container *ngIf="filtroSexo !== 'hombre' && filtroSexo !== 'mujer'; else listaCompleta">
    <p>Mostrando listas de contactos completa</p>
</ng-container>
<ng-template #listaCompleta>
    <p>Mostrando Amigos {{ filtroSexo }}</p>
</ng-template>

<a routerLink="/home">Volver</a>
