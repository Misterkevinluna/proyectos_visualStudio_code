<h1>Juego del Amigo invisible</h1>
<h3>¡Bienvenido!</h3>

<ng-container *ngIf="contactoSeleccionado; else noSeleccionado">
    <h4>Has seleccionado a: {{ contactoSeleccionado.nombre }}</h4>
</ng-container>
<ng-template #noSeleccionado>
    <div>
        <p>Selecciona a tu Amigo Invisible</p>
    </div>
</ng-template>


<!-- Hacer un Login -->
<a *ngIf="!token" routerLink="/login">Iniciar Sesión en Login</a> 

<button (click)="navegarAContacts()">Ver todos tus contactos</button>
<button *ngIf="token" (click)="logout()">Logout</button>

<div>
    <p>Filtro:</p>
    <a [routerLink]="['/contacts']" [queryParams]="{sexo: 'mujer'}">Amigas  |</a>
    <a [routerLink]="['/contacts']" [queryParams]="{sexo: 'hombre'}">  Amigos</a>
</div>
