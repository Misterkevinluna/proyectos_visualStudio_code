<html>
  <body>
    <div class="formularioRegistro">
      <h2>Crear Usuario</h2>
      <form [formGroup]="userForm" (ngSubmit)="guardar()">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" formControlName="name" class="form-control">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="text" formControlName="email" class="form-control">
        </div> 
    
        <button type="submit" class="btn btn-primary btn_guardar" [disabled]="userForm.invalid">Guardar</button> 
    
      </form>
    </div>
    
    <div class="tablaDeUser">
      <h2>Asignar Vehiculos</h2>
      <form [formGroup]="carForm" (ngSubmit)="guardarVehiculo()">
    
        <div class="form-group">
          <label>Vehiculos</label>
          <select name="vehiculo" id="IdVehiculo" class="form-control" (change)="onVehicleSelectionChange($event)">
            <option value="moto">Moto</option>
            <option value="carro">Carro</option>
          </select>
        </div>
    
        <div class="form-group">
          <label>Id</label>
          <input type="number" formControlName="userId" class="form-control">
        </div>
    
        <div class="form-group">
          <label>Marca</label>
          <input type="text" formControlName="brand" class="form-control">
        </div>
        <div class="form-group">
          <label>Modelo</label>
          <input type="text" formControlName="model" class="form-control">
        </div> 
    
        <button type="submit" class="btn btn-primary btn_guardar" [disabled]="carForm.invalid">Guardar Vehiculo</button> 
        
      </form>
    </div>
    
    <section>
  
      <div class="tablaDeUser">
        <h2>Personas Registradas</h2>
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>NOMBRE</th>
              <th>EMAIL</th>
              <th>Opciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of user">
              <th>{{item.id}}</th>
              <td>{{item.name}}</td>
              <td>{{item.email}}</td>
              <td>
                <button type="button" class="btn btn-success" (click)="editar(item)">Ediatar</button>
                <button type="button" class="btn btn-danger" (click)="eliminarUser(item)">Eliminar</button>
              </td>
            </tr>
          </tbody>
      
        </table>
      </div>
    </section>
  </body>

</html>
